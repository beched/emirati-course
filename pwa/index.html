<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1420">
<title>Emirati Arabic — Speak in 1 Hour</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0f1420;--bg2:#161c2b;--card:#1b2233;--card2:#222b40;
  --ink:#eef2fb;--muted:#95a2c0;--line:#2b3550;
  --red:#ef4457;--grn:#2ecc71;--gold:#f0b429;--blue:#5aa9ff;--purp:#a78bfa;
  --ar:#ffffff;--az:#8fe3b0;--radius:16px;
  --arfont:"SF Arabic","Geeza Pro","Noto Naskh Arabic","Amiri","Times New Roman",serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-text-size-adjust:100%;line-height:1.5;padding-bottom:92px}
a{color:var(--blue)}
h1,h2,h3{line-height:1.2;margin:0 0 .4em}
h2{font-size:1.25rem}h3{font-size:1.02rem;color:var(--gold)}
p{margin:.5em 0}small,.note{color:var(--muted);font-size:.82rem}
.wrap{max-width:780px;margin:0 auto;padding:0 14px}

header{position:sticky;top:0;z-index:30;backdrop-filter:blur(12px);
  background:rgba(15,20,32,.82);border-bottom:1px solid var(--line);
  padding:calc(8px + env(safe-area-inset-top)) 0 8px}
.hrow{display:flex;align-items:center;gap:10px}
.logo{font-family:var(--arfont);font-size:1.5rem;color:var(--red);font-weight:700;line-height:1}
.brand b{font-size:.98rem}.brand small{display:block;font-size:.66rem;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.toggles{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.tg{font-size:.72rem;border:1px solid var(--line);background:var(--card);color:var(--muted);
  border-radius:999px;padding:5px 9px;cursor:pointer;user-select:none;white-space:nowrap}
.tg b{color:var(--ink)}.tg.on{border-color:var(--grn)}.tg.on b{color:var(--az)}

nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;
  background:rgba(20,26,40,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
nav.tabs button{flex:1;background:none;border:none;color:var(--muted);font-size:.6rem;
  padding:9px 2px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit}
nav.tabs .ic{font-size:1.15rem;line-height:1}
nav.tabs button.on{color:var(--ink)}
nav.tabs button.on{position:relative}
nav.tabs button.on::after{content:"";position:absolute;top:0;width:26px;height:3px;border-radius:3px;background:var(--red)}

section.view{display:none;padding:16px 0 10px}
section.view.on{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.ar{font-family:var(--arfont);color:var(--ar);direction:rtl;unicode-bidi:isolate;font-size:1.55rem;line-height:1.9}
.ar.big{font-size:2rem}
.az{color:var(--az);font-style:italic;font-size:.95rem}
.en{color:var(--ink)}
.iso{unicode-bidi:isolate;display:inline-block}
.vguide{width:100%;border-collapse:collapse;font-size:.88rem;margin:8px 0}
.vguide td{border:1px solid var(--line);padding:5px 8px}
.vguide .v{color:var(--gold);font-weight:700;font-family:ui-monospace,monospace}
.hide-az .az{display:none!important}
.gloss .ar{font-size:1.7rem}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;margin:12px 0}
.card.tight{padding:11px 13px}.card h3:first-child{margin-top:0}
.hd{display:flex;align-items:center;gap:8px;margin:22px 0 6px}
.hd .n{font-size:.72rem;color:var(--bg);background:var(--gold);border-radius:6px;padding:2px 7px;font-weight:700}
.lead{color:var(--muted);font-size:.92rem;margin:.2em 0 .8em}

.rowlist{display:flex;flex-direction:column;gap:1px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:var(--card);padding:9px 12px}
.row .l{min-width:0}.row .en{font-size:.9rem}.row .az{font-size:.8rem}
.row .ar{font-size:1.35rem;text-align:right}
.row.head{background:var(--card2);color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px}
.tag{display:inline-block;font-size:.62rem;padding:1px 6px;border-radius:5px;background:var(--card2);color:var(--muted);border:1px solid var(--line);margin-left:6px;vertical-align:middle}

.chips{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0}
.chip{font-size:.8rem;border:1px solid var(--line);background:var(--card2);border-radius:999px;padding:6px 12px;cursor:pointer;color:var(--muted)}
.chip.on{background:var(--red);border-color:var(--red);color:#fff}
.chip.g.on{background:var(--grn);border-color:var(--grn)}
.chip.b.on{background:var(--blue);border-color:var(--blue)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--red);color:#fff;
  border:none;border-radius:12px;padding:12px 16px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn.ghost{background:var(--card2);color:var(--ink);border:1px solid var(--line)}
.btn.grn{background:var(--grn)}.btn.gold{background:var(--gold);color:#20160a}
.btn.blk{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.btn.blue{background:var(--blue);color:#04203f}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4}
.btnrow{display:flex;gap:8px;flex-wrap:wrap}.btnrow .btn{flex:1;min-width:110px}
.btn.sm{padding:8px 12px;font-size:.82rem;border-radius:10px}

input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:12px 14px;font-size:1rem;font-family:inherit}
input:focus{outline:none;border-color:var(--blue)}
label.fld{display:block;font-size:.75rem;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px}

.callout{border-left:3px solid var(--gold);background:var(--card2);border-radius:0 12px 12px 0;padding:10px 12px;margin:10px 0;font-size:.9rem}
.callout.g{border-color:var(--grn)}.callout.r{border-color:var(--red)}.callout.b{border-color:var(--blue)}
.kbd{font-family:var(--arfont);background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:1px 8px;color:var(--gold);font-size:1.1rem}

table.key{width:100%;border-collapse:collapse;font-size:.9rem}
table.key td,table.key th{border:1px solid var(--line);padding:6px 8px;text-align:left}
table.key th{background:var(--card2);color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase}
table.key .k{font-family:var(--arfont);color:var(--gold);font-size:1.2rem;text-align:center}

details{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:8px 0;padding:0 13px}
details summary{cursor:pointer;padding:12px 0;font-weight:600;list-style:none}
details summary::-webkit-details-marker{display:none}
details summary::before{content:"▸ ";color:var(--gold)}details[open] summary::before{content:"▾ "}
details .body{padding:0 0 12px}

/* progress bits */
.prog{height:7px;background:var(--card2);border-radius:6px;overflow:hidden}
.prog i{display:block;height:100%;background:linear-gradient(90deg,var(--grn),var(--gold));width:0;transition:width .3s}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center}
.tile b{display:block;font-size:1.7rem;line-height:1;color:var(--gold)}
.tile span{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.tile.grn b{color:var(--grn)}.tile.red b{color:var(--red)}.tile.blue b{color:var(--blue)}

/* lesson list */
.lesson{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:12px 14px;margin:9px 0;cursor:pointer}
.lesson:active{transform:scale(.99)}
.lesson .badge{width:34px;height:34px;border-radius:9px;background:var(--card2);display:flex;align-items:center;
  justify-content:center;font-weight:700;color:var(--muted);flex:0 0 auto}
.lesson.done .badge{background:var(--grn);color:#04210f}
.lesson.started .badge{background:var(--gold);color:#20160a}
.lesson .lmeta{min-width:0;flex:1}
.lesson .lmeta b{display:block;font-size:.95rem}
.lesson .lmeta small{color:var(--muted)}
.lesson .arrow{color:var(--muted)}
.hdrback{background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:10px;
  padding:6px 11px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.hdrback:active{transform:scale(.96)}
.totop{position:fixed;right:14px;bottom:calc(74px + env(safe-area-inset-bottom));z-index:35;display:none;
  width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(27,34,51,.92);
  color:var(--ink);font-size:1.2rem;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.35)}
.totop.on{display:block;animation:fade .2s ease}
.levelhd{display:flex;align-items:center;justify-content:space-between;margin:22px 0 4px;padding:0 4px;
  font-size:.82rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--gold);
  border-bottom:1px solid var(--line);padding-bottom:6px}

/* drill / quiz */
.stage{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:20px;
  padding:22px 16px;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;text-align:center;position:relative}
.stage .tasktag{position:absolute;top:10px;left:14px;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.stage .dir{position:absolute;top:10px;right:14px;font-size:.62rem;color:var(--blue);text-transform:uppercase;letter-spacing:.6px}
.stage .prompt{font-size:1.4rem;font-weight:600}
.stage .prompt.ar{font-size:2rem;font-weight:400}
.stage .ansbox{width:100%;border-top:1px dashed var(--line);padding-top:12px}
.opt{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:12px 14px;margin:8px 0;cursor:pointer;font-family:inherit;font-size:1rem}
.opt .ar{font-size:1.5rem}
.opt.correct{border-color:var(--grn);background:rgba(46,204,113,.15)}
.opt.wrong{border-color:var(--red);background:rgba(239,68,87,.15)}
.opt:disabled{opacity:1}
.feedback{font-weight:700;font-size:1rem}
.feedback.ok{color:var(--grn)}.feedback.no{color:var(--red)}
.segrow{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.matrix{width:100%;border-collapse:collapse;font-size:.86rem}
.matrix td,.matrix th{border:1px solid var(--line);padding:5px 7px;text-align:center}
.matrix th{background:var(--card2);color:var(--muted);font-size:.7rem}
.matrix .p{color:var(--muted);text-align:right;font-size:.78rem;white-space:nowrap}
.matrix .ar{font-size:1.15rem;white-space:nowrap}
.matrix .azc{color:var(--az);font-size:.74rem;font-style:italic}
.weakrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin:6px 0}
.weakrow .mn{margin-left:auto;color:var(--red);font-weight:700}
.flash{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:22px;
  padding:28px 18px;min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;text-align:center;position:relative;cursor:pointer}
.flash .front{font-size:1.3rem;font-weight:600}.flash .kind{position:absolute;top:12px;left:14px;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.flash .tap{position:absolute;bottom:12px;font-size:.7rem;color:var(--muted)}
.flash .ar{font-size:2.2rem}.flash .divider{width:40px;height:2px;background:var(--line)}
.grade{display:none;gap:8px;margin-top:12px}.grade.on{display:flex}.grade .btn{flex:1}
.pattern{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;align-items:baseline;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin:8px 0}
.pattern .tpl{font-family:var(--arfont);color:var(--gold);font-size:1.4rem;direction:rtl}
.reveal{color:var(--muted);cursor:pointer;font-size:.85rem;border:1px dashed var(--line);border-radius:8px;padding:8px 10px;display:inline-block;margin-top:6px}
.answer{color:var(--az);font-family:var(--arfont);direction:rtl;font-size:1.35rem}
.footy{color:var(--muted);font-size:.8rem;text-align:center;padding:20px 0 10px}
.big-ar-out{font-family:var(--arfont);direction:rtl;font-size:2rem;color:#fff;text-align:center;margin:6px 0}
hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0}
.intro-hero{background:linear-gradient(135deg,#1a2338,#141b2c);border:1px solid var(--line);border-radius:20px;padding:20px;margin:6px 0 14px;text-align:center}
.flagline{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--grn) 0 25%,#fff 25% 50%,#111 50% 75%,var(--red) 75% 100%);margin:8px auto;max-width:220px}
.pill-count{font-size:.72rem;color:var(--muted)}
.back{color:var(--blue);cursor:pointer;font-size:.9rem;display:inline-block;margin:2px 0 8px}
ol.ex,ul.ex{padding-inline-start:20px}ol.ex li,ul.ex li{margin:.35em 0}
</style>
</head>
<body>
<header>
  <div class="wrap hrow">
    <button id="hdrBack" class="hdrback" onclick="backToLessons()" style="display:none">‹ Lessons</button>
    <span id="hdrHome" class="hrow" style="gap:10px"><span class="logo">ع</span>
    <div class="brand"><b>Emirati Arabic</b><small>Speak in 1 hour</small></div></span>
    <div class="toggles">
      <span class="tg on" id="tgAz" onclick="toggleAz()">Arabizi <b id="azState">ON</b></span>
      <span class="tg" id="tgGen" onclick="toggleGender()">Speaker <b id="genState">♂ male</b></span>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="view on" id="v-home"></section>
  <section class="view" id="v-lessons"></section>
  <section class="view" id="v-drill"></section>
  <section class="view" id="v-cards"></section>
  <section class="view" id="v-ref"></section>
</main>

<nav class="tabs">
  <button class="on" data-v="home" onclick="go('home')"><span class="ic">📊</span>Home</button>
  <button data-v="lessons" onclick="backToLessons()"><span class="ic">📘</span>Lessons</button>
  <button data-v="drill" onclick="go('drill')"><span class="ic">🔁</span>Drills</button>
  <button data-v="cards" onclick="go('cards')"><span class="ic">🎴</span>Cards</button>
  <button data-v="ref" onclick="go('ref')"><span class="ic">📚</span>Reference</button>
</nav>

<button id="toTop" class="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">↑</button>

<script>
/* ============================================================
   DATA — grounded in Al Ramsa Institute Emirati Arabic A1–B2
   Arabizi: 7=ح 3=ع gh=غ kh=خ th=ث dh=ذ/ظ sh=ش  g=ق  ch=ك→چ  y=ج
   ============================================================ */
const LEX = {
pronouns:[
 {en:"I / me",ar:"أَنا",az:"ana"},{en:"you (m)",ar:"إنْتَ",az:"enta"},{en:"you (f)",ar:"إنْتِ",az:"enti"},
 {en:"he",ar:"هُوْ",az:"hu"},{en:"she",ar:"هِيْ",az:"hi"},{en:"we",ar:"إحْنا",az:"e7na"},
 {en:"you (pl)",ar:"إنْتُوا",az:"entoo"},{en:"they",ar:"هُمْ",az:"hum"},
],
possess:[
 {en:"my",ar:"ـي",az:"-i",note:"baiti"},{en:"your (m)",ar:"ـَك",az:"-ak",note:"baitak"},
 {en:"your (f)",ar:"ـِچ",az:"-ich",note:"baitich"},{en:"his",ar:"ـَه",az:"-ah",note:"baitah"},
 {en:"her",ar:"ـها",az:"-ha",note:"baitha"},{en:"our",ar:"ـنا",az:"-na",note:"baitna"},
 {en:"your (pl)",ar:"ـكُم",az:"-kum"},{en:"their",ar:"ـهُم",az:"-hum"},
],
questions:[
 {en:"what?",ar:"شُو؟",az:"shoo?"},{en:"who?",ar:"مِنُو؟",az:"minoo?"},{en:"where?",ar:"وِيْن؟",az:"wain?"},
 {en:"when?",ar:"مِتى؟",az:"meta?"},{en:"why?",ar:"لِيْش؟",az:"laish?"},{en:"how?",ar:"چِيْف؟",az:"chaif?"},
 {en:"how much / many?",ar:"كَمْ؟",az:"kam?"},{en:"which?",ar:"أيّ؟",az:"ay?"},
 {en:"how much (price)?",ar:"بِكَمْ؟",az:"bekam?"},{en:"is there…?",ar:"فِيْ…؟",az:"fee…?"},
],
particles:[
 {en:"yes",ar:"هِيَه",az:"haih"},{en:"no",ar:"لا",az:"la"},{en:"not (noun/adj)",ar:"مُبْ",az:"mub"},
 {en:"not / didn't (verb)",ar:"ما",az:"ma"},{en:"there is / in",ar:"فِيْ",az:"fee"},{en:"there isn't",ar:"ما فِيْ",az:"ma fee"},
 {en:"I have",ar:"عِنْدي",az:"3indi"},{en:"I want",ar:"أبا",az:"aba"},{en:"I know",ar:"أعْرَفْ",az:"a3ref"},
 {en:"I'm aware",ar:"أدْري",az:"adri"},{en:"very",ar:"وايِدْ",az:"wayed"},{en:"a little",ar:"شْوَيْ",az:"shway"},
 {en:"only / just",ar:"بَسْ",az:"bas"},{en:"also",ar:"بَعَدْ",az:"ba3ad"},{en:"maybe",ar:"يِمْكِنْ",az:"yimkin"},
 {en:"of course",ar:"أكِيدْ",az:"akeed"},{en:"must / have to",ar:"لازِمْ",az:"laazim"},{en:"I can",ar:"أقْدَرْ",az:"agdar"},
 {en:"good / ok",ar:"زِيْنْ",az:"zain"},{en:"perfect / done",ar:"تَمامْ",az:"tamaam"},{en:"like this",ar:"چِذي",az:"chidhi"},
 {en:"every",ar:"كِلْ",az:"kil"},{en:"thing",ar:"شِيْ",az:"shai"},{en:"God willing",ar:"إنْ شاءَ الله",az:"in shaa Allah"},
 {en:"thank God",ar:"الحَمْدُ لله",az:"el 7amdulillah"},{en:"let's / c'mon",ar:"يَلّا",az:"yalla"},
 {en:"available / present",ar:"مَوْجودْ",az:"mawjood"},{en:"crowded / traffic",ar:"زَحْمَة",az:"za7ma"},
],
connectors:[
 {en:"and",ar:"وْ",az:"wo"},{en:"or",ar:"أوْ",az:"aw"},{en:"but",ar:"بَسْ",az:"bas"},
 {en:"because",ar:"عَشانْ",az:"3ashaan"},{en:"that's why",ar:"عَشانْ چِيْ",az:"3ashaan chee"},
 {en:"so",ar:"فَـ",az:"fa"},{en:"and then",ar:"وْبَعْدَيْنْ",az:"wo ba3dain"},
 {en:"which / who / that",ar:"اللّي",az:"elly"},{en:"that (I think that)",ar:"إنّ",az:"enna"},
 {en:"if",ar:"إذا",az:"edha"},{en:"until",ar:"لَيْنْ",az:"lain"},{en:"with (a person)",ar:"وِيا",az:"wiya"},
 {en:"before",ar:"قَبِلْ",az:"gabel"},{en:"after",ar:"بَعَدْ",az:"ba3ad"},
],
prepositions:[
 {en:"in / at",ar:"فِيْ",az:"fee"},{en:"on",ar:"عَلى",az:"3ala"},{en:"from",ar:"مِنْ",az:"min"},
 {en:"to / for",ar:"حَقّ",az:"7ag"},{en:"about",ar:"عَنْ",az:"3an"},{en:"with",ar:"مَعَ",az:"ma3a"},
 {en:"next to",ar:"يَمّ",az:"yamm"},{en:"under",ar:"تَحْت",az:"ta7t"},{en:"above",ar:"فوقْ",az:"foog"},
 {en:"in front of",ar:"قِدّامْ",az:"giddaam"},{en:"behind",ar:"وَرا",az:"wara"},{en:"between",ar:"بِيْنْ",az:"bain"},
 {en:"here",ar:"هِنِي",az:"hini"},{en:"there",ar:"هِناكْ",az:"hinaak"},
],
demonstr:[
 {en:"this (m)",ar:"هٰذا",az:"haadha"},{en:"this (f)",ar:"هٰذي",az:"haadhi"},{en:"this + noun",ar:"هالـ",az:"hal-"},
 {en:"these",ar:"هٰذولا",az:"hadhola"},{en:"that (m)",ar:"ذاكْ",az:"dhaak"},{en:"that (f)",ar:"ذيچْ",az:"dheech"},
],

<div class="callout g">One rule: soften formal Arabic — <b>q→g, j→y, k→ch</b>.</div>
<h3>Vowels: short vs long</h3>
<table class="vguide"><tr><td><span class="v">a</span> / <span class="v">aa</span></td><td>short а / long а̄ — bas · baab (held)</td></tr>
<tr><td><span class="v">i</span>, <span class="v">e</span></td><td>short, a clipped <b>и</b> (closer to и than э; leans to э only next to 7, 3, gh, q)</td></tr>
<tr><td><span class="v">ee</span></td><td>long <b>и</b> as in “see” / мир — yed<b>ee</b>d</td></tr>
<tr><td><span class="v">o</span> / <span class="v">oo</span></td><td>short о / long <b>у</b> as in “moon” / суп — r<b>oo</b>7</td></tr></table>
<div class="callout b"><b>Stress:</b> on the long vowel (aa/ee/oo), usually the last — a-<b>ROO7</b>, ta3-<b>BAAN</b>, <b>BAA</b>-cher. No long vowel? Stress the first syllable — <b>MAR</b>-7aba. Arabic stress is light; clean consonants matter more.</div>`,
ex:[
 {t:'mcq',q:"Which sound does “7” stand for?",opts:[{az:"ح — a hard breathy H"},{az:"خ — kh"},{az:"ه — soft h"},{az:"ع"}],a:0},

,
 {t:'mcq',q:"“3” (as in 3arabi) stands for…",opts:[{az:"ع — a tight throat vowel"},{az:"the number three"},{az:"a silent letter"},{az:"غ (gh)"}],a:0},
 {t:'mcq',q:"In Emirati, the letter ج often becomes…",opts:[{az:"y (yedeed = new)"},{az:"g"},{az:"ch"},{az:"kh"}],a:0}]},

{id:"have",t:"My, your & having",sub:"the endings that do the work",drill:{gen:'possess'},

html:`<p class="lead">One set of endings does both jobs: glue it to a noun for <b>my/your/his</b>, or to <b>3ind</b> (“at”) for <b>have</b>.</p>

${G("هٰذا كِتابَكْ","haadha kitaabak","this is your book")}
${G("عِنْدي سَيّارَة","3indi sayyaara","I have a car")}

<tr><td class="v">-ha / -na / -hum</td><td>her / our / their</td></tr></table>`,

{id:"iform",t:"Core verbs — “I ___”",sub:"one prefix unlocks dozens",drill:{gen:'iform'},
words:[

html:`<p class="lead">To say “I do X”, start the verb with <b>a-</b> (أ). Every Arabic verb grows from a <b>3-letter root</b>; the “I” form pours it into the shape <b>a‑ _ _ i _</b>.</p>
<table class="matrix"><tr><td class="p">root k·t·b <small>(writing)</small></td><td class="ar">أكْتِبْ</td><td class="azc">a-ktib = I write</td></tr>
<tr><td class="p">root sh·r·b <small>(drinking)</small></td><td class="ar">أشْرَبْ</td><td class="azc">a-shrab = I drink</td></tr>
<tr><td class="p">root l·3·b <small>(playing)</small></td><td class="ar">ألْعَبْ</td><td class="azc">a-l3ab = I play</td></tr></table>
<div class="callout g">The payoff: the moment you know a root you can build “I …” — <b>k·t·b → aktib</b> (I write), <b>f·h·m → afham</b> (I understand). The <b>Word Builder</b> (Reference) shows how the same root makes the noun, the doer and the place too.</div>
${G("أرْمِسْ عَرَبي شْوَيْ بَسْ","armes 3arabi shway bas","I speak a little Arabic")}
${G("أسيرْ البِيْتْ وْ أرْقُدْ","aseer el bait wo argud","I go home and I sleep")}
<div class="callout">A few verbs bend the vowels (hollow: aroo7 / aseer / ashoof; doubled: a7ebb / a7ott) — but they all still start with <b>a-</b>. The full “he/you/we…” set comes in the Present-tense lesson.</div>`,

words:[

${G("ما أقْدَرْ أروحْ","ma agdar aroo7","I can't go")}

html:`<p class="lead">Present verbs change the <b>front</b> letter for each person — this is the “multiplication table” you bring to automatism.</p>
<table class="matrix"><tr><td class="p">I go</td><td class="ar">أروحْ</td><td class="azc">aroo7</td><td class="p">he goes</td><td class="ar">يْروحْ</td><td class="azc">yroo7</td></tr>
<tr><td class="p">you go</td><td class="ar">تْروحْ</td><td class="azc">troo7</td><td class="p">we go</td><td class="ar">نْروحْ</td><td class="azc">nroo7</td></tr>
<tr><td class="p">you-f</td><td class="ar">تْروحينْ</td><td class="azc">troo7een</td><td class="p">they go</td><td class="ar">يْروحونْ</td><td class="azc">yroo7oon</td></tr></table>

{id:"past",t:"Past tense",drill:{gen:'verb',layer:'past'},sub:"telling what happened",
words:[{en:"was / were",ar:"كانْ",az:"kaan"},{en:"yesterday",ar:"أمْسْ",az:"ams"}],
html:`<p class="lead">Past changes the <b>end</b> of the verb. An <b>-t</b> ending = I/you did it.</p>
${G("أمْسْ رِحِتْ البَرّ","ams ri7t el barr","yesterday I went to the desert")}
${G("شافْ فيلمْ حِلو","shaaf film 7elo","he saw a nice movie")}
<div class="callout"><b>kaan</b> = was/were. “I've been to Dubai” is just past: <i>ri7t Dubai</i>.</div>`,

,

words:[
 {en:"cars",ar:"سَيّاراتْ",az:"sayyaaraat"},{en:"houses",ar:"بْيوتْ",az:"byoot"},{en:"boys",ar:"أوْلادْ",az:"awlaad"},
 {en:"girls",ar:"بَناتْ",az:"banaat"},{en:"books",ar:"كُتُبْ",az:"kutub"},{en:"days",ar:"أيّامْ",az:"ayyaam"},
 {en:"hour → hours",ar:"ساعَة → ساعاتْ",az:"saa3a → saa3aat"},{en:"men",ar:"رْياييلْ",az:"ryaayeel"},{en:"restaurants",ar:"مَطاعِمْ",az:"mataa3im"},{en:"schools",ar:"مَدارِسْ",az:"madaaris"}],
html:`<p class="lead">Arabic plurals mostly don't just “add -s”. Two things to know:</p>
<h3>1. Feminine words (‑a) → add ‑aat</h3>
${G("سَيّارَة → سَيّاراتْ","sayyaara → sayyaaraat","car → cars")}
${G("ساعَة → ساعاتْ","saa3a → saa3aat","hour → hours")}
<h3>2. Most others are “broken” — the word reshapes</h3>
${G("بِيْتْ → بْيوتْ","bait → byoot","house → houses")}
${G("وَلَدْ → أوْلادْ","walad → awlaad","boy → boys")}
${G("كِتابْ → كُتُبْ","kitaab → kutub","book → books")}
<div class="callout">There's no shortcut — broken plurals are learned per word (like English “man→men”). Drill the common ones; the rest you'll pick up by ear.</div>`,
ex:[
 {t:'mcq',q:"plural of سَيّارَة (car)",opts:[{az:"sayyaaraat",ar:"سَيّاراتْ"},{az:"sayyaarat",ar:"سَيّارَتْ"},{az:"sayaayir",ar:"سَيايِرْ"},{az:"sayyaarateen",ar:"سَيّارَتينْ"}],a:0},

 {t:'say',q:"books (plural)",ans:{az:"kutub",ar:"كُتُبْ"}},
,

html:`<p class="lead">To say “Y's X” or “the X of Y”, just put the two nouns together — <b>owned first, owner second</b>. No “of”, no apostrophe.</p>
${G("بِيْتْ أبوي","bait ubooy","my father's house (house-of-my-father)")}
${G("بابْ البِيْتْ","baab el bait","the house door (door-of-the-house)")}
<div class="callout">If the first noun is feminine (ends in ‑a / ة), it takes a <b>‑t</b>: <i>sayyaara</i> → <i>sayyaarat akhooy</i> (my brother's car). Only the <b>last</b> noun takes “the” (el).</div>`,

,

html:`<p class="lead">From one root you get two “‑ing / ‑ed” words: the <b>doer</b> (faa3il) and the <b>done</b> (maf3ool). They behave like adjectives / states.</p>
<table class="matrix"><tr><td class="p">k·t·b (write)</td><td class="ar">كاتِبْ</td><td class="azc">kaatib = a writer / writing</td></tr>
<tr><td class="p">k·t·b (write)</td><td class="ar">مَكْتوبْ</td><td class="azc">maktoob = written</td></tr>
<tr><td class="p">s·k·n (live)</td><td class="ar">ساكِنْ</td><td class="azc">saakin = living / a resident</td></tr></table>
${G("أنا ساكِنْ فِيْ دُبَيْ","ana saakin fee Dubai","I'm living in Dubai (a resident)")}
${G("الأكِلْ جاهِزْ وْ الرِّسالَة مَكْتوبَة","el akil jaahiz wo er-risaala maktooba","the food is ready and the letter is written")}

/* ---- verb sentence builder (Petrov) ---- */
const LAYERS=[{id:'present',name:'Present'},{id:'past',name:'Past'},{id:'future',name:'Future'},{id:'negation',name:'Negation'},{id:'questions',name:'Questions'},{id:'imperative',name:'Imperative'},{id:'mixed',name:'Mixed'}];
function arFuture(f){if(f[0]==='أ')return 'بَ'+f.slice(1);if(f[0]==='آ')return 'با'+f.slice(1);return 'بَ'+f;}
function azFuture(f){return f[0]==='a'?'b'+f:'ba'+f;}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function enStatement(V,P,tense,pol,obj){const inf=V.en[0],s=V.en[1],pa=V.en[2],o=' '+obj.en;
 if(pol==='pos'){if(tense==='present')return `${P.en} ${P.third?s:inf}${o}`;if(tense==='past')return `${P.en} ${pa}${o}`;return `${P.en} will ${inf}${o}`;}
 if(tense==='present')return `${P.en} ${P.third?"doesn't":"don't"} ${inf}${o}`;if(tense==='past')return `${P.en} didn't ${inf}${o}`;return `${P.en} won't ${inf}${o}`;}
function verbPoolFor(verbSetId){if(verbSetId&&verbSetId!=='all'){const V=VERBS.find(v=>v.id===verbSetId);return V?[V]:VERBS;}
 const d=PROG.drill,pool=[];VERBS.forEach(V=>{const m=(d.byKey&&d.byKey['V:'+V.id]&&d.byKey['V:'+V.id].miss)||0;const w=1+Math.min(4,m);for(let k=0;k<w;k++)pool.push(V);});return pool;}
function buildItem(layer0,verbSetId){
 const V=pick(verbPoolFor(verbSetId));let layer=layer0;if(layer==='mixed')layer=pick(['present','past','future','negation','questions','imperative']);
 let tense='present',pol='pos',mood='statement';
 if(layer==='past')tense='past';else if(layer==='future')tense='future';
 else if(layer==='negation'){pol='neg';tense=pick(['present','past','future']);}
 else if(layer==='questions'){mood='question';tense=pick(['present','past']);}
 else if(layer==='imperative')mood='imperative';
 if(tense==='future'&&V.noFut)tense=pick(['present','past']);
 if(mood==='imperative'&&V.noImp){mood='statement';tense=pick(['present','past']);}
 let pi;if(mood==='imperative')pi=pick([1,2,6]);else pi=ri(8);
 const P=PRN[pi],obj=pick(V.objs);let ar,az,en;
 if(mood==='imperative'){const idx=pi===1?0:(pi===2?1:2);const neg=Math.random()<0.4;
  if(neg){az=`la ${V.az.pr[pi]} ${obj.az}`;ar=`لا ${V.ar.pr[pi]} ${obj.ar}`;en=`Don't ${V.en[0]} ${obj.en}!`;}
  else{az=`${V.az.im[idx]} ${obj.az}`;ar=`${V.ar.im[idx]} ${obj.ar}`;en=`${cap(V.en[0])} ${obj.en}!`;}
  layer='imperative';
 }else{let vaz,var_;
  if(tense==='present'){vaz=V.az.pr[pi];var_=V.ar.pr[pi];}else if(tense==='past'){vaz=V.az.pa[pi];var_=V.ar.pa[pi];}
  else{vaz=azFuture(V.az.pr[pi]);var_=arFuture(V.ar.pr[pi]);}
  const negAz=pol==='neg'?'ma ':'',negAr=pol==='neg'?'ما ':'';
  if(mood==='question'){const canWh=V.mode==='trans'||V.mode==='motion';const wh=canWh&&Math.random()<0.5;
   if(wh){const qw=V.mode==='motion'?['wain','وِيْن','Where']:['shoo','شُو','What'];az=`${qw[0]} ${vaz}?`;ar=`${qw[1]} ${var_}؟`;
    const aux=tense==='past'?'did':(P.third?'does':'do');en=`${qw[2]} ${aux} ${P.en} ${V.en[0]}?`;}
   else{az=`${P.az} ${vaz} ${obj.az}?`;ar=`${P.ar} ${var_} ${obj.ar}؟`;const aux=tense==='past'?'Did':(P.third?'Does':'Do');en=`${aux} ${P.en} ${V.en[0]} ${obj.en}?`;}
  }else{az=`${P.az} ${negAz}${vaz} ${obj.az}`.trim();ar=`${P.ar} ${negAr}${var_} ${obj.ar}`;en=enStatement(V,P,tense,pol,obj);}
 }
 return {V,layer,ar:ar.trim(),az:az.trim(),en:en.trim(),tag:(LAYERS.find(l=>l.id===layer)||{}).name||layer};
}
function genItem(spec){
 if(spec.gen==='verb')return buildItem(spec.layer||'mixed',spec.verb||spec.verbSet||'all');
 if(spec.gen==='phrase')return phraseItem(spec.theme);
 if(spec.gen==='conn')return Object.assign({tag:'connectors'},pick(CONN));
 if(spec.gen==='prep')return Object.assign({tag:'prepositions'},pick(PREPS));
 if(spec.gen==='list')return Object.assign({tag:spec.tag||'grammar'},pick(spec.items));
 if(GENR[spec.gen])return GENR[spec.gen]();
 return {ar:'؟',az:'?',en:'?',tag:''};
}

const drills={};

function drillMount(id,spec,dir){drills[id]={spec,dir:dir||'both',cur:null,shown:false,sess:{a:0,c:0}};drillNew(id);}
function drillNew(id){const d=drills[id];if(!d)return;d.cur=genItem(d.spec);d.shown=false;d.dirNow=d.dir==='both'?pick(['en2ar','ar2en']):d.dir;drillRender(id);}
function drillRender(id){const d=drills[id];if(!d)return;const it=d.cur,st=document.getElementById(id+'_stage');if(!st)return;const tag=it.tag||'';
 if(!d.shown){
  if(d.dirNow==='en2ar')st.innerHTML=`<div class="tasktag">${esc(tag)}</div><div class="dir">EN → AR</div><div class="prompt">${esc(it.en)}</div><div class="note">say it in Emirati…</div>`;
  else st.innerHTML=`<div class="tasktag">${esc(tag)}</div><div class="dir">AR → EN</div><div class="prompt ar">${it.ar}</div><div class="az">${esc(it.az)}</div><div class="note">what does it mean?</div>`;
  const g=document.getElementById(id+'_grade');if(g)g.classList.remove('on');const s=document.getElementById(id+'_show');if(s)s.style.display='';
 }else{st.innerHTML=`<div class="tasktag">${esc(tag)}</div><div class="prompt ar">${it.ar}</div><div class="az">${esc(it.az)}</div><div class="ansbox"><div class="en">${esc(it.en)}</div></div>`;
  const g=document.getElementById(id+'_grade');if(g)g.classList.add('on');const s=document.getElementById(id+'_show');if(s)s.style.display='none';}}
function drillShowA(id){if(drills[id]){drills[id].shown=true;drillRender(id);

function drillGr(id,ok){const d=drills[id];if(!d)return;const key=d.spec.key||('G:'+d.spec.gen);recDrillKey(key,d.spec.label||d.cur.tag||d.spec.gen,ok);
 d.sess.a++;if(ok)d.sess.c++;const s=document.getElementById(id+'_sess');if(s)s.textContent=`${d.sess.a} done · ${d.sess.c} right`;drillNew(id);}

function shuffleEx(e){if(e.t==='say'||!e.opts)return;const idx=e.opts.map((_,i)=>i);
 for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const tmp=idx[i];idx[i]=idx[j];idx[j]=tmp;}

{level:"A2",title:"My weekend & my past",
 en:"Yesterday was Friday, so I was free. In the morning I slept until ten, then I drank coffee and read a book. After that I called my friends and we went to the desert. The weather was amazing, so we stayed there until the evening. We ate and drank tea, and honestly it was really nice. I used to live in Russia, and there the weather was cold. Now I live in Dubai and I work every day. Tomorrow I'll go back to work, so I have to sleep early. Next weekend I want to go to the sea with my brother. I want to learn Arabic well and talk with people.",
 ar:"أمْسْ كانْ يومْ الجُمْعَة، عَشانْ چيْ كِنِتْ فاضي. الصُّبِحْ رَقَدْتْ لَحَدّ عَشْرْ، بَعْدَيْنْ شِرِبْتْ قَهْوَة وْ قَريْتْ كِتابْ. بَعَدْ چِذي اتّصَلْتْ عَلى رَبْعي وْ رِحْنا البَرّ. الجَوّ كانْ روعَة، عَشانْ چيْ قِعَدْنا هْناكْ لَحَدّ المَسا. أكَلْنا وْ شِرِبْنا چايْ، وْ بِصَراحَة كانْ وايِدْ حِلو. كِنِتْ ساكِنْ فِيْ روسْيا، وْ هْناكْ الجَوّ كانْ بارِدْ. الحِيْنْ ساكِنْ فِيْ دُبَيْ وْ أشْتِغِلْ كِلْ يومْ. باچِرْ بَرْجَعْ الدَّوامْ، عَشانْ چيْ لازِمْ أرْقُدْ بَدْري. الوِيْكِنْدْ الياي أبا أسيرْ البَحَرْ وِيا أخوي. أبا أتْعَلَّمْ عَرَبي زِيْنْ وْ أرْمِسْ وِيا النّاسْ.",
 az:"ams kaan youm el yum3a, 3ashan chee kint faadhi. el sub7 ragadt la7add 3ashar, ba3dain shiribt gahwa wo garait kitaab. ba3ad chidhi ittasalt 3ala rab3i wo ri7na el barr. el jaw kaan raw3a, 3ashan chee gi3adna hnaak la7add el masa. akalna wo shiribna chai, wo bsara7a kaan wayed 7elo. kint saakin fee Russia, wo hnaak el jaw kaan baarid. el7een saakin fee Dubai wo ashteghel kil youm. baacher barja3 el dawaam, 3ashan chee laazim argud badri. el weekend el yaay aba aseer el ba7ar wiya akhooy. aba at3allam 3arabi zain wo armes wiya el naas."},
{level:"B1",title:"Opinions & plans",
 en:"Honestly, I think Dubai is the best city in the Emirates. My friend told me the weather in winter is amazing, and I feel he's right. If I have time on the weekend, I'll go to the sea or the desert. I think learning a language is very important. I mean, if you talk with people every day, you learn fast, but if you only read books, it's slow. Last year I didn't know much Arabic, but now I understand well. Sometimes it's hard, and sometimes I make mistakes, but it's okay. What do you think — is Arabic hard? For me, it's not hard, it just needs patience. Anyway, I want to keep learning until I speak well.",
 ar:"بِصَراحَة، أعْتِقِدْ إنّ دُبَيْ أحْسَنْ مَدينَة فِيْ الإماراتْ. رِبْعي قالْ لي إنّ الجَوّ فِيْ الشِّتا روعَة، وْ أحِسّ إنَّه صادِقْ. إذا عِنْدي وَقِتْ فِيْ الوِيْكِنْدْ، بَسيرْ البَحَرْ أوْ البَرّ. أعْتِقِدْ إنّ تَعَلُّمْ اللُّغَة وايِدْ مُهِمّ. يَعْني، إذا تِرْمِسْ وِيا النّاسْ كِلْ يومْ، تِتْعَلَّمْ بْسُرْعَة، بَسْ إذا بَسْ تِقْرا كُتُبْ، يْصيرْ بْطيءْ. السَّنَة اللّي فاتَتْ ما كِنِتْ أعْرَفْ وايِدْ عَرَبي، بَسْ الحِيْنْ أفْهَمْ زِيْنْ. أحْياناً صَعِبْ، وْ أحْياناً أغْلَطْ، بَسْ عادي. شُو رايَكْ — العَرَبي صَعِبْ؟ بِالنِّسْبَة لي، مُبْ صَعِبْ، بَسْ يِبْغى صَبِرْ. عَلى كِلْ حالْ، أبا أضِلّ أتْعَلَّمْ لَحَدّ ما أرْمِسْ زِيْنْ.",
 az:"bsara7a, a3teged enna Dubai a7san madeena fee el Emaraat. rab3i gaal li enna el jaw fee el shita raw3a, wo a7ess ennah saadig. edha 3indi wagt fee el weekend, baseer el ba7ar aw el barr. a3teged enna ta3allum el lugha wayed muhim. ya3ni, edha tirmes wiya el naas kil youm, tit3allam bsur3a, bas edha bas tigra kutub, yseer btee'. el sana elly faatat ma kint a3ref wayed 3arabi, bas el7een afham zain. a7yaanan sa3ab, wo a7yaanan aghlat, bas 3aadi. shoo rayek — el 3arabi sa3ab? bilnisba li, mub sa3ab, bas yibgha sabr. 3ala kil 7aal, aba adhill at3allam la7add ma armes zain."},
{level:"B2",title:"Ten years here",
 en:"I've been living in the Emirates for ten years now. When I first arrived, I didn't know a single word of Arabic, and honestly it was hard. But little by little I started to understand, and now I speak a lot. My work is nice and my manager is well-known and generous. Although the summer is extremely hot, I love this country, because the people are kind. By the way, the most important thing when you learn a language is not to be afraid to speak. The more you talk, the more you learn — I wish someone had told me that at the beginning. I hope to stay here a long time, and God willing my kids will grow up speaking two languages. Anyway, whoever wants to learn should just start, and not wait.",
 ar:"أنا ساكِنْ فِيْ الإماراتْ مِنْ عَشْرْ سِنينْ الحِيْنْ. أوّلْ ما وْصَلْتْ، ما كِنِتْ أعْرَفْ ولا كِلْمَة عَرَبي، وْ بِصَراحَة كانْ صَعِبْ. بَسْ شْوَيْ شْوَيْ بَدَيْتْ أفْهَمْ، وْ الحِيْنْ أرْمِسْ وايِدْ. شِغْلي حِلو وْ مُديري مَعْروفْ وْ كَريمْ. مَعَ إنّ الصَّيْفْ حَرّ موتْ، بَسْ أحِبّ هالدَّوْلَة، عَشانْ النّاسْ طَيّبينْ. عَلى فِكْرَة، أهَمّ شِيْ لَمّا تِتْعَلَّمْ لُغَة، إنَّكْ ما تْخافْ تِرْمِسْ. كِلْ ما تِرْمِسْ، كِلْ ما تِتْعَلَّمْ — يا لَيْتْ أحَدْ قالْ لي چِذي مِنْ البِدايَة. أتْمَنّى أضِلّ هِني وَقِتْ طَويلْ، وْ إنْ شاءَ الله عْيالي بَيِكْبَرونْ يِرْمِسونْ لُغَتَيْنْ. عَلى كِلْ حالْ، اللّي يْبا يِتْعَلَّمْ لازِمْ بَسْ يِبْدا، وْ ما يِنْتِظِرْ.",
 az:"ana saakin fee el Emaraat min 3ashar sneen el7een. awwal ma wsalt, ma kint a3ref wala kilma 3arabi, wo bsara7a kaan sa3ab. bas shway shway badait afham, wo el7een armes wayed. shighli 7elo wo mudeeri ma3roof wo kareem. ma3a enna el sayf 7arr moot, bas a7ebb hal-dawla, 3ashaan el naas tayybeen. 3ala fikra, ahamm shai lamma tit3allam lugha, ennak ma tkhaaf tirmes. kil ma tirmes, kil ma tit3allam — yalait a7ad gaal li chidhi min el bidaaya. atmanna adhill hini wagt taweel, wo in shaa Allah 3yaali bayikbaroon yirmisoon lughatain. 3ala kil 7aal, elly yiba yit3allam laazim bas yibda, wo ma yintidhir."},
];

function revealText(k){const el=document.getElementById('txtout'+k);if(el)el.innerHTML=`<div class="gloss" style="margin-top:8px"><div class="ar" style="font-size:1.45rem;line-height:1.95">${TEXTS[k].ar}</div><div class="az" style="margin-top:6px">${esc(TEXTS[k].az)}</div></div>`;}
function renderRead(b){let h=`<div class="hd"><span class="n">✍️</span><h2>Translate by level</h2></div>
  <p class="lead">Read the English, say/write the whole thing in Emirati, then reveal to check. Match your level (A1 → B2).</p>`;
 TEXTS.forEach((t,k)=>{h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b>${esc(t.title)}</b><span class="tag">${t.level}</span></div>
   <div class="en" style="line-height:1.6">${esc(t.en)}</div>
   <div class="reveal" style="margin-top:8px" onclick="revealText(${k})">tap to reveal the Emirati ▾</div><div id="txtout${k}"></div></div>`;});
 h+=`<div class="hd"><span class="n">📖</span><h2>Reading passages</h2></div><p class="lead">Read aloud; use Arabizi as a crutch, then turn it off.</p>`;
 READ.forEach(t=>{h+=`<div class="card"><h3>${esc(t.title)}</h3>`;t.lines.forEach(l=>{h+=`<div class="gloss" style="margin:12px 0"><div class="ar" style="font-size:1.5rem">${l[0]}</div><div class="az">${esc(l[1])}</div><div class="en note">${esc(l[2])}</div></div>`;});h+=`</div>`;});
 h+=`<div class="hd"><span class="n">✍️</span><h2>Translation drills</h2></div><p class="lead">Say each in Emirati, then reveal.</p>`;
 DRILL_TXT.forEach(d=>{h+=`<div class="card tight"><div class="en" style="font-weight:600">${esc(d.en)}</div>
   <div class="reveal" onclick="this.outerHTML='<div class=&quot;gloss&quot;><div class=&quot;ar&quot; style=&quot;font-size:1.4rem&quot;>${d.ar}</div><div class=&quot;az&quot;>${esc(d.az)}</div></div>'">tap to reveal ▾</div></div>`;});
 b.innerHTML=h;}

/* ================= NAV ================= */
function go(tab){S.tab=tab;save();
 document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
 document.getElementById('v-'+tab).classList.add('on');
 document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('on',b.dataset.v===tab));
 setHdr(false);
 if(tab==='home')renderHome();   /* refresh dashboard from latest progress each time it's opened */
 window.scrollTo(0,0);}
function setHdr(inLesson){const b=document.getElementById('hdrBack'),hm=document.getElementById('hdrHome');
 if(b)b.style.display=inLesson?'':'none';if(hm)hm.style.display=inLesson?'none':'';}
function backToLessons(){go('lessons');renderLessons();}
window.addEventListener('scroll',function(){const t=document.getElementById('toTop');if(t)t.classList.toggle('on',window.scrollY>320);});
function renderAll(){renderHome();renderLessons();renderDrill();renderCards();renderRef();}
applyToggles();renderAll();go(S.tab);

</script>

if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("./sw.js").catch(function(e){console.log("SW reg failed",e)});});}
